# fly.toml app configuration file generated for bazos-byt-notifier on 2026-04-30T20:12:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "bazos-parser-apartments"
primary_region = "fra"  # Frankfurt — closest to SK

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  CHECK_INTERVAL_SEC = '600'
  DB_PATH = '/data/bazos.sqlite3'
  PYTHONUNBUFFERED = '1'

[processes]
  app = 'python -u bot.py'

[[mounts]]
  source = 'bazos_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
